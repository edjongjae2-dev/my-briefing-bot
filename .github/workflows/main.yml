name: Daily Briefing

on:
  schedule:
    # 한국 시간 오전 7:00 배달 (영국 시간 전날 22:00)
    - cron: '0 22 * * *'
    # 한국 시간 오후 3:40 배달 (영국 시간 당일 06:40)
    - cron: '40 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # 🌟 여기에 AI 부품(google-generativeai)을 추가했습니다!
        run: |
          pip install requests beautifulsoup4 yfinance google-generativeai

      - name: Run Briefing Robot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 🌟 금고에서 제미나이 열쇠를 꺼내오는 명령!
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python briefing_robot.py
