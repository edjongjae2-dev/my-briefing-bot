name: Daily Briefing

on:
  schedule:
    # 1. 한국 시간 오전 06:42 배달 (기존 7시에서 1시간 앞당김 + 지연 대비 20분 추가 확보)
    # 영국 시간(UTC) 전날 21:42
    - cron: '42 21 * * *'
    
    # 2. 한국 시간 오후 03:17 배달 (기존 3시 40분에서 조금 앞당김)
    # 영국 시간(UTC) 당일 06:17
    - cron: '17 6 * * *'
    
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 yfinance google-generativeai

      - name: Run Briefing Robot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python briefing_robot.py
