name: Daily Briefing Bot

on:
  schedule:
    - cron: '20 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # 🌟 여기에 주식(yfinance)과 AI(google-generativeai) 부품을 추가했습니다!
        run: |
          pip install requests beautifulsoup4 yfinance google-generativeai

      - name: Run Briefing Robot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python briefing_robot.py
